# eai-vc environment.yml — manipulation subset (Adroit + Meta-World) only
# Pruned from original eai-vc/environment.yml:
# - removed: habitat-sim (habitat), eigenpy/pinocchio/pybullet (trifinger), headless
# - kept: pytorch 1.13 + cudatoolkit 11.6 + mujoco-py stack (paper protocol 일치 우선)
name: eai-vc
channels:
  - pytorch
  - conda-forge
dependencies:
  - black
  - click
  - cloudpickle
  - cffi
  - cmake=3.22.1
  - cudatoolkit=11.6
  # mujoco-py needs Cython<3 (cymj.pyx uses pre-PEP-688 noexcept syntax)
  - cython<3
  - flake8
  - glfw
  - hydra-core
  - ifcfg
  - isort
  - imageio
  - ipdb
  - ipython
  - jupyter
  - mamba
  - mkl-service
  - moviepy
  - numpy==1.23.4
  - opencv
  - pandas
  - patchelf
  - pillow
  - protobuf=3.20.1
  - pytest
  - pytest-xdist
  - python=3.8
  # NOTE: pytorch=1.13 / torchvision=0.14 from conda는 sm_90 (H100) 미지원.
  # install_eai_vc.sh 가 pip로 torch 2.1.2+cu118 (sm_90 포함) 으로 교체.
  - pytorch=1.13
  - pyyaml
  - scipy
  - seaborn
  - six
  - submitit
  - tabulate
  - tensorboard
  - termcolor
  - transforms3d
  - torchvision=0.14.0
  - tqdm
  - wandb>=0.13
  - wheel
  - yacs
  - pip
  - pip:
    - hydra-submitit-launcher
    - dm-control==1.0.5
    # dm-control 1.0.5 expects mujoco 2.x API (eq_active field renamed in 3.0)
    - mujoco<3
    - gym==0.23.1
    - setuptools==59.5.0
    - timm==0.6.11
    - git+https://github.com/openai/CLIP.git
    - functorch
    - torchrl
    - classy_vision==0.6.0
    # v15 / videomae_ours wrapper deps (from src/cortexbench/*_loader.py)
    - h5py
    - einops
    # siglip / dinov2 wrapper: HuggingFace transformers (single-image baseline)
    - transformers
