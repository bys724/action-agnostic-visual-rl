hydra:
  run:
    dir: /workspace/paper_artifacts/cortexbench/videomae_ours/hammer-v2-goal-observable/seed_300
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    cpus_per_task: 20
    gpus_per_node: 1
    tasks_per_node: 1
    timeout_min: 600
    mem_gb: 64
    name: ${hydra.job.name}
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.LocalLauncher
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=/workspace/paper_artifacts/cortexbench/videomae_ours/hammer-v2-goal-observable/seed_300
    - hydra.mode=RUN
    task:
    - env=hammer-v2-goal-observable
    - embedding=videomae_ours
    - seed=300
    - data_dir=/mnt/data/cortexbench/datasets/metaworld-expert-v1.0/
    - wandb.project=cortexbench_c11
    - wandb.entity=local
  job:
    name: metaworld_cortex_vil
    chdir: null
    override_dirname: data_dir=/mnt/data/cortexbench/datasets/metaworld-expert-v1.0/,embedding=videomae_ours,env=hammer-v2-goal-observable,seed=300,wandb.entity=local,wandb.project=cortexbench_c11
    id: ???
    num: ???
    config_name: Metaworld_BC_config.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /workspace/external/eai-vc/cortexbench/mujoco_vc/visual_imitation
    config_sources:
    - path: vc_models.conf
      schema: pkg
      provider: vc_models-plugin
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/external/eai-vc/cortexbench/mujoco_vc/visual_imitation/config
      schema: file
      provider: main
    - path: classy_vision.hydra.conf
      schema: pkg
      provider: classy_vision
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/paper_artifacts/cortexbench/videomae_ours/hammer-v2-goal-observable/seed_300
    choices:
      wandb: cortexbench
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: local
      hydra/output: default
  verbose: false
